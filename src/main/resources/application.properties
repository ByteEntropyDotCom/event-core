spring.application.name=event-core
server.port=808

# H2 Configuration - MUST match resilience-core to share the data
# Use a file-based or named mem DB so both apps hit the same instance
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Reconciliation Settings
# How often the worker wakes up (30 seconds)
reconciliation.interval=30000

# Logging for visibility
logging.level.com.byteentropy.event_core=DEBUG